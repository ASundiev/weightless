name: Apply DB migrations

on:
  push:
    branches: [main]
    paths:
      - "db/migrations/**"
      - "db/migrate.sh"
      - ".github/workflows/db-push.yml"
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PGSSLMODE: require
    steps:
      - uses: actions/checkout@v4
      - name: Apply migrations
        run: bash db/migrate.sh
